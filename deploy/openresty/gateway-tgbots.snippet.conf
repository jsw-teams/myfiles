# Include these locations inside the existing gateway.js.gripe server block.
# They make Telegram Bot API file fetches stream-friendly for large media previews.

location = /api/v1/tgbots/fetch {
    access_log off;
    default_type application/json;
    content_by_lua_file /etc/openresty/lua/tgbots_fetch.lua;
}

location ^~ /__tgbots_proxy/ {
    internal;
    access_log off;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_set_header Host 127.0.0.1;
    proxy_set_header Range $http_range;
    proxy_set_header If-Range $http_if_range;
    proxy_set_header Connection "";
    proxy_pass http://telegram_bot_api_backend/;
}
