# Include this snippet inside the existing files.js.gripe server block.
# Do not put ssl_certificate or ssl_certificate_key here.
# Wildcard certificate paths must remain in the server-level configuration.

client_max_body_size 0;
add_header Link "</.well-known/api-catalog>; rel=\"api-catalog\", </auth.md>; rel=\"service-doc\", </.well-known/oauth-protected-resource>; rel=\"oauth-protected-resource\", </.well-known/mcp/server-card.json>; rel=\"mcp-server-card\", </.well-known/agent-skills/index.json>; rel=\"agent-skills\"" always;
add_header Content-Signal "ai-train=no, search=no, ai-input=no" always;
add_header Permissions-Policy "browsing-topics=(), join-ad-interest-group=(), run-ad-auction=(), tools=(self)" always;

location ~ ^/(\.env|bin/\.env|logs/\.env|scripts/\.env|asset-manifest\.json|build-manifest\.json|webpack-stats\.json|stats\.json)$ {
    return 404;
}

location ~ ^/(\.git|\.next|_next|_nuxt|\.astro|\.vite)/ {
    return 404;
}

location = /auth/account/callback {
    # Avoid logging account_session query strings returned by account-system.
    access_log off;
    proxy_pass http://127.0.0.1:19110;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 15s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
}

location ~ ^/(api|auth|files|pickup)/ {
    proxy_pass http://127.0.0.1:19110;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 15s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
}

location ~ ^/(og)/ {
    proxy_pass http://127.0.0.1:19110;
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Range $http_range;
    proxy_set_header If-Range $http_if_range;
    proxy_connect_timeout 15s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
}

location ~ ^/(dashboard|admin|setup)(/|$) {
    add_header X-Robots-Tag "noindex, nofollow" always;
    proxy_pass http://127.0.0.1:19110;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 15s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
}

location / {
    proxy_pass http://127.0.0.1:19110;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_connect_timeout 15s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
}
